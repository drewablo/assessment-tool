# Production docker-compose. Use with .env.prod (see .env.prod.example).
# Start: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build

services:
  db:
    image: postgis/postgis:16-3.4
    platform: linux/amd64
    restart: unless-stopped
    environment:
      POSTGRES_DB: feasibility
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@db:5432/feasibility
      REDIS_URL: redis://redis:6379/0
      USE_DB: ${USE_DB:-true}
      FRONTEND_URL: ${FRONTEND_URL}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CENSUS_API_KEY: ${CENSUS_API_KEY:-}
      ORS_API_KEY: ${ORS_API_KEY:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A pipeline.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@db:5432/feasibility
      REDIS_URL: redis://redis:6379/0
      USE_DB: "true"
      CENSUS_API_KEY: ${CENSUS_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A pipeline.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@db:5432/feasibility
      REDIS_URL: redis://redis:6379/0
      CENSUS_API_KEY: ${CENSUS_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Nginx routes /api/* to the backend, so the browser uses the same origin.
        NEXT_PUBLIC_API_URL: ${FRONTEND_URL}
        NEXT_PUBLIC_API_KEY: ${INTERNAL_API_KEY}
        NEXT_PUBLIC_USE_DB: ${USE_DB:-true}
        NEXTAUTH_URL: ${FRONTEND_URL}
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    restart: unless-stopped
    environment:
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${FRONTEND_URL}
      AUTH_USERS: ${AUTH_USERS}
    healthcheck:
      # Probe a dedicated unauthenticated health endpoint to avoid
      # false negatives from auth/session configuration.
      test: ["CMD", "node", "-e", "const http=require('http');const req=http.get('http://127.0.0.1:3000/api/health',(res)=>{console.log('status='+res.statusCode);process.exit(res.statusCode<400?0:1)});req.on('error',(err)=>{console.error(err.message);process.exit(1)});req.setTimeout(4000,()=>{console.error('timeout');req.destroy();process.exit(1)});"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      api:
        condition: service_healthy

volumes:
  pgdata:
