# Rate limit zone for login/auth endpoints — 5 requests per second per IP
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

# HTTP — redirect to HTTPS when SSL is configured
server {
    listen 80;
    server_name _;

    # When SSL certs are present, redirect all HTTP to HTTPS.
    # Comment out the return 301 and uncomment the location blocks below
    # if you need to run HTTP-only (e.g., local dev without certs).
    # return 301 https://$host$request_uri;

    # Resolve Docker service names dynamically so Nginx can recover when
    # upstream containers restart with a new IP.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Max upload size for audit PDFs
    client_max_body_size 25M;

    # Proxy the Next.js frontend
    location / {
        set $frontend_upstream http://frontend:3000;
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # NextAuth routes must be handled by the Next.js frontend
    # Rate-limited to prevent brute force attacks on login
    location /api/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        set $frontend_upstream http://frontend:3000;
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy the FastAPI backend
    location /api/ {
        set $backend_upstream http://api:8000;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Increase timeouts for long-running analysis requests
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}

