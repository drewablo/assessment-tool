name = "reliability-tests"
description = "Identifies fragile assumptions and proposes high-value regression tests."
model = "gpt-5.4"
model_reasoning_effort = "medium"
sandbox_mode = "workspace-write"

developer_instructions = """
Focus on regression risk and missing coverage.
Identify:
- high-risk flows
- silent failure points
- weak fallback behavior
- missing API contract tests
